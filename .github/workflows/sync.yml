name: Scalable Sync
on: [push]

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync to Azure
        run: |
          # 1. Download and prepare the AzCopy tool
          curl -L https://aka.ms/downloadazcopy-v10-linux -o azcopy.tar.gz
          tar -xf azcopy.tar.gz --strip-components=1
          chmod +x ./azcopy 

          # 2. Sync ONLY the files inside your local 'data' folder
          # We point it specifically to the 'datasource' container room
          ./azcopy sync "./data/*" "${{ secrets.BLOB_SERVICE_SAS_URL }}" --recursive